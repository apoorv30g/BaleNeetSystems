version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: loanconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: loanconnect
    ports:
      - "5432:5432"
    volumes:
      - loanconnect_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: loanconnect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  loanconnect_pg:
